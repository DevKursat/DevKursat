name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: DevKursat
          outputs: |
            ./dist/github-snake.svg
            ./dist/github-snake-dark.svg
          palettes: |
            {
              "github-snake": ["#2C1810,#40E0D0,#5FEED0,#1A0F08,#40E0D0"],
              "github-snake-dark": ["#2C1810,#40E0D0,#5FEED0,#1A0F08,#40E0D0"]
            }

      - name: Recolor via Python — replace CSS variable values
        run: |
          python3 - <<'PY'
          import re, pathlib
          # (variable_name, new_color) — target CSS variables directly
          # Original Platane/snk: --c0..c4 (levels), --ce (empty), --cb (border w/ alpha)
          mapping = [
              ("--cb:", "#2C1810"),     # control border (alpha stripped)
              ("--cs:", "#40E0D0"),     # control stroke
              ("--ce:", "#1A0F08"),     # control empty -> dark brown
              ("--c0:", "#2C1810"),     # level 0 -> dark brown bg
              ("--c1:", "#40E0D0"),     # level 1 -> turquoise
              ("--c2:", "#5FEED0"),     # level 2 -> light turquoise
              ("--c3:", "#7FFFD4"),     # level 3 -> aquamarine
              ("--c4:", "#40E0D0"),     # level 4 -> turquoise
          ]
          for f in pathlib.Path("./dist").glob("*.svg"):
              txt = f.read_text()
              for var, new in mapping:
                  txt = re.sub(re.escape(var) + r"#[0-9A-Fa-f]+", var + new, txt)
              f.write_text(txt)
              print(f"recolored: {f}")
          PY

      - name: Verify
        run: |
          echo "=== CSS variables in output ==="
          grep -oE -- "--c[0-9]:#[0-9A-Fa-f]+|--ce:#[0-9A-Fa-f]+|--cb:#[0-9A-Fa-f]+" ./dist/github-snake.svg | head -10

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
