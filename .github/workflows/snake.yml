name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: DevKursat
          outputs: |
            ./dist/github-snake.svg
            ./dist/github-snake-dark.svg
          palettes: |
            github-snake: ["#2C1810,#40E0D0,#5FEED0,#1A0F08,#40E0D0"]
            github-snake-dark: ["#2C1810,#40E0D0,#5FEED0,#1A0F08,#40E0D0"]

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
